<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Tail -->
  <path d="M140 120 C160 100, 175 70, 165 45 C155 20, 130 25, 135 50 C140 75, 135 95, 130 110" fill="#C78D5D" stroke="#92400E" stroke-width="2"/>
  <path d="M145 115 C162 98, 172 72, 163 50 C156 30, 138 33, 140 52 C143 72, 139 92, 135 108" fill="#D4A574" stroke="none"/>

  <!-- Body -->
  <ellipse cx="100" cy="130" rx="42" ry="38" fill="#C78D5D" stroke="#92400E" stroke-width="2"/>
  <!-- Belly -->
  <ellipse cx="100" cy="135" rx="28" ry="25" fill="#F5E6D3"/>

  <!-- Left arm holding magnifying glass -->
  <path d="M68 125 C55 115, 42 100, 38 90" fill="none" stroke="#92400E" stroke-width="2"/>
  <path d="M70 122 C58 112, 46 98, 42 90" fill="#C78D5D" stroke="#92400E" stroke-width="2"/>
  <!-- Right arm -->
  <path d="M132 125 C142 130, 145 140, 140 145" fill="#C78D5D" stroke="#92400E" stroke-width="2"/>

  <!-- Magnifying glass -->
  <circle cx="30" cy="78" r="16" fill="none" stroke="#92400E" stroke-width="3"/>
  <circle cx="30" cy="78" r="12" fill="#E0F2FE" opacity="0.5"/>
  <line x1="42" y1="90" x2="50" y2="98" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
  <!-- Sparkle on glass -->
  <path d="M24 72 L26 70 L28 72 L26 74 Z" fill="white" opacity="0.8"/>

  <!-- Question mark acorn (faded) -->
  <ellipse cx="145" cy="150" rx="8" ry="7" fill="#F59E0B" opacity="0.3"/>
  <path d="M137 147 C137 143, 141 140, 145 140 C149 140, 153 143, 153 147" fill="#92400E" opacity="0.3"/>
  <text x="143" y="155" font-size="10" fill="#92400E" opacity="0.4" font-family="sans-serif" font-weight="bold">?</text>

  <!-- Head (slightly tilted) -->
  <g transform="rotate(-8 100 70)">
    <circle cx="100" cy="70" r="35" fill="#C78D5D" stroke="#92400E" stroke-width="2"/>
    <!-- Face light area -->
    <circle cx="100" cy="73" r="26" fill="#D4A574"/>

    <!-- Left ear -->
    <ellipse cx="72" cy="45" rx="12" ry="16" fill="#C78D5D" stroke="#92400E" stroke-width="2" transform="rotate(-15 72 45)"/>
    <ellipse cx="72" cy="45" rx="7" ry="11" fill="#FFB8A8" transform="rotate(-15 72 45)"/>
    <!-- Right ear -->
    <ellipse cx="128" cy="45" rx="12" ry="16" fill="#C78D5D" stroke="#92400E" stroke-width="2" transform="rotate(15 128 45)"/>
    <ellipse cx="128" cy="45" rx="7" ry="11" fill="#FFB8A8" transform="rotate(15 128 45)"/>

    <!-- Eyes (curious look - one bigger) -->
    <circle cx="87" cy="68" r="7" fill="#2D1B0E"/>
    <circle cx="113" cy="68" r="5.5" fill="#2D1B0E"/>
    <!-- Eye highlights -->
    <circle cx="89" cy="66" r="3" fill="white"/>
    <circle cx="115" cy="66" r="2" fill="white"/>

    <!-- Nose -->
    <ellipse cx="100" cy="78" rx="4" ry="3" fill="#2D1B0E"/>

    <!-- Curious mouth (small o) -->
    <ellipse cx="100" cy="85" rx="4" ry="3.5" fill="#2D1B0E"/>
    <ellipse cx="100" cy="84.5" rx="2.5" ry="2" fill="#4A2520"/>

    <!-- Cheek blush -->
    <ellipse cx="78" cy="80" rx="7" ry="5" fill="#FFB8A8" opacity="0.6"/>
    <ellipse cx="122" cy="80" rx="7" ry="5" fill="#FFB8A8" opacity="0.6"/>
  </g>

  <!-- Feet -->
  <ellipse cx="82" cy="168" rx="14" ry="7" fill="#C78D5D" stroke="#92400E" stroke-width="2"/>
  <ellipse cx="118" cy="168" rx="14" ry="7" fill="#C78D5D" stroke="#92400E" stroke-width="2"/>
</svg>
